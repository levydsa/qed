<!doctype html>
<html lang="pt-BR">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="/assets/tw.css" rel="stylesheet" />
    <link rel="icon" href="/assets/qed.svg" />

    <title>error</title>

    <script>
      const themeSet = new Set(["dark", "light"]);
      const theme = window.localStorage.getItem("theme");
      const preference = window.matchMedia("(prefers-color-scheme: dark)")
        .matches
        ? "dark"
        : "light";

      const root = document.documentElement;
      root.setAttribute("data-theme", themeSet.has(theme) ? theme : preference);

      function toggleScheme() {
        let theme = root.getAttribute("data-theme");
        theme = theme === "dark" ? "light" : "dark";

        root.setAttribute("data-theme", theme);
        window.localStorage.setItem("theme", theme);
      }
    </script>
  </head>

  <body
    class="mx-auto hyphens-auto text-justify dark:bg-black dark:text-slate-200"
  >
    <header class="mb-10 h-20"></header>

    <main>
      <div class="mx-auto max-w-[80ch] px-4">
        <pre>
            {{ content }}
          </pre
        >
      </div>
    </main>

    <footer class="mt-10 h-20"></footer>
  </body>
</html>
